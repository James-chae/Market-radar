name: Update KR universe and latest data

on:
  workflow_dispatch:
  schedule:
    - cron: '35 6 * * 1-5'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Build universe
        run: python scripts/build_universe_from_naver.py

      - name: Generate latest data
        run: python scripts/generate_latest_krx_from_naver.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/universe_kr_top400.json data/latest_krx.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "update KR universe and latest data"
          git push

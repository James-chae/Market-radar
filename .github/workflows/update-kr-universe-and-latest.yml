name: Update KR universe and latest

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scripts/build_universe_from_naver.py
      - run: python scripts/generate_latest_krx_from_naver.py
      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/universe_kr_top1000.json data/latest_krx.json
          git diff --cached --quiet || git commit -m "update kr universe and latest"
          git push

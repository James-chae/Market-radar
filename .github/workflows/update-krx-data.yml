name: Update KRX close data

on:
  workflow_dispatch:
  schedule:
    - cron: '10 7 * * 1-5'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 라이브러리 설치
        run: pip install requests pandas

      - name: KRX 데이터 생성
        run: python scripts/generate_krx_json.py

      - name: 결과 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest_krx.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "update krx data"
          git push

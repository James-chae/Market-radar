name: Update KRX close data

on:
  workflow_dispatch:
  schedule:
    - cron: '10 7 * * 1-5'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 라이브러리 설치
        run: pip install requests pandas

      - name: KRX 데이터 생성
        run: python scripts/generate_krx_json.py

      - name: 결과 커밋
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add data/latest_krx.json
          git diff --cached --quiet || git commit -m "update krx data"
          git push

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Market Radar - KRTOP</title>
<style>
body {font-family: Arial; background:#0b0f1a; color:#fff;}
.tab {display:inline-block; padding:10px; cursor:pointer;}
.section {display:none; padding:20px;}
.section.active {display:block;}
.lead-row {display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #222;}
.lead-rank {width:30px;}
.lead-name {flex:1;}
.lead-pct.up {color:#ff4d4d;}
.lead-pct.down {color:#4da6ff;}
</style>
</head>
<body>

<div>
  <div class="tab" onclick="showTab('home')">홈</div>
  <div class="tab" onclick="showTab('krtop')">📈 한국 상승률</div>
</div>

<div id="home" class="section active">
  <h2>HOME</h2>
</div>

<div id="krtop" class="section">
  <h2>한국 상승률 TOP30</h2>
  <div id="krtop-loading">로딩중...</div>
  <div id="krtop-list"></div>
</div>

<script>
function showTab(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='krtop') loadKRTop30();
}

async function loadKRTop30(){
  const container = document.getElementById('krtop-list');
  const loading = document.getElementById('krtop-loading');

  container.innerHTML='';
  loading.style.display='block';

  try{
    const all=[];

    for(let page=1; page<=10; page++){
      const url=`https://finance.naver.com/sise/sise_rise.naver?sosok=0&page=${page}`;
      const proxy="https://corsproxy.io/?url="+encodeURIComponent(url);

      const res=await fetch(proxy);
      const text=await res.text();
      const doc=new DOMParser().parseFromString(text,'text/html');
      const rows=doc.querySelectorAll('.type_2 tr');

      rows.forEach(row=>{
        const cols=row.querySelectorAll('td');
        if(cols.length>0){
          const name=cols[1]?.innerText.trim();
          const pct=cols[3]?.innerText.trim();
          if(name && pct && pct.includes('%')){
            const val=parseFloat(pct.replace('%','').replace('+',''));
            if(!isNaN(val)) all.push({name,pct:val});
          }
        }
      });
    }

    all.sort((a,b)=>b.pct-a.pct);
    const top30=all.slice(0,30);

    container.innerHTML=top30.map((d,i)=>`
      <div class="lead-row">
        <div class="lead-rank">${i+1}</div>
        <div class="lead-name">${d.name}</div>
        <div class="lead-pct ${d.pct>=0?'up':'down'}">
          ${d.pct>=0?'+':''}${d.pct.toFixed(1)}%
        </div>
      </div>
    `).join('');

  }catch(e){
    container.innerHTML='데이터 오류';
    console.error(e);
  }

  loading.style.display='none';
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Radar</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #0b0f14;
    color: #fff;
}

.container {
    padding: 10px;
}

h1 {
    text-align: center;
    margin: 10px 0;
}

.card {
    background: #11161d;
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 10px;
}

.loading {
    text-align: center;
    opacity: 0.7;
}

.positive { color: #ff4d4f; }
.negative { color: #4da6ff; }

</style>
</head>

<body>
<div class="container">

<h1>📊 Market Radar</h1>

<div id="leadstocks" class="card">
    <h2>🔥 오늘의 주도주</h2>
    <div id="leadstocks-loading" class="loading">데이터 불러오는 중...</div>
    <div id="leadstocks-list"></div>
</div>

<div id="krstocks" class="card">
    <h2>🇰🇷 한국 종목</h2>
    <div id="krstocks-list"></div>
</div>

</div>

<script>

let latestData = null;
let sectorMap = null;

// ✅ JSON 로딩 (캐시 방지)
async function loadJSON(path) {
    const res = await fetch(path + '?t=' + Date.now());
    return await res.json();
}

// ✅ 초기 로딩
async function init() {
    document.getElementById("leadstocks-loading").style.display = "block";

    try {
        latestData = await loadJSON("data/latest_krx.json");
        sectorMap = await loadJSON("data/kr_sector_master_single.json");

        renderLeadStocks();
        renderKRStocks();

    } catch (e) {
        console.error(e);
    }

    document.getElementById("leadstocks-loading").style.display = "none";
}

// ✅ 섹터 가져오기 (단일 기준만 사용)
function getSector(code) {
    return sectorMap[code]?.sector1 || "";
}

// ✅ 오늘의 주도주 (핵심 수정)
function renderLeadStocks() {

    const list = Object.entries(latestData);

    // 🔥 거래대금 TOP50
    const topValue = [...list]
        .sort((a,b)=>b[1].value - a[1].value)
        .slice(0,50);

    // 🔥 상승률 TOP50
    const topRate = [...list]
        .sort((a,b)=>b[1].rate - a[1].rate)
        .slice(0,50);

    const topValueSet = new Set(topValue.map(x=>x[0]));

    // ✅ 교집합만 (핵심)
    const leaders = topRate.filter(x=>topValueSet.has(x[0]));

    // ✅ 상승률 음수 제거 (버그 원인 제거)
    const filtered = leaders.filter(x=>x[1].rate > 0);

    // 정렬: 거래대금 기준
    filtered.sort((a,b)=>b[1].value - a[1].value);

    const container = document.getElementById("leadstocks-list");
    container.innerHTML = "";

    filtered.forEach(([code, d], i) => {

        const sector = getSector(code);

        const el = document.createElement("div");
        el.innerHTML = `
            ${i+1}. ${d.name}
            <span class="${d.rate >=0 ? 'positive':'negative'}">
                ${d.rate.toFixed(2)}%
            </span>
            | ${Math.round(d.value/100000000)}억
            | ${sector}
        `;

        container.appendChild(el);
    });
}

// ✅ 한국 종목 전체
function renderKRStocks() {

    const list = Object.entries(latestData)
        .sort((a,b)=>b[1].value - a[1].value)
        .slice(0,100);

    const container = document.getElementById("krstocks-list");
    container.innerHTML = "";

    list.forEach(([code, d], i) => {

        const sector = getSector(code);

        const el = document.createElement("div");
        el.innerHTML = `
            ${i+1}. ${d.name}
            <span class="${d.rate >=0 ? 'positive':'negative'}">
                ${d.rate.toFixed(2)}%
            </span>
            | ${Math.round(d.value/100000000)}억
            | ${sector}
        `;

        container.appendChild(el);
    });
}

init();

</script>

</body>
</html>
